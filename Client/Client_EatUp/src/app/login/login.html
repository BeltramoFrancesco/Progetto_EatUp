<div class="login-page">

  <div class="container-fluid h-100">
    <div class="row h-100">

      <!-- SINISTRA (branding) -->
      <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center left-side text-white">
        <h1 class="display-3 fw-bold mb-3">🍽️ EatUp</h1>
        <p class="lead text-center w-75">
          Organizza le tue ricette e pianifica la settimana in modo semplice e veloce.
        </p>
      </div>

      <!-- DESTRA (login) -->
      <div class="col-lg-6 d-flex justify-content-center align-items-center right-side">

        <div class="login-card shadow-lg">

          <div class="mb-4 text-center">
            <h2 class="fw-bold">Bentornato 👋</h2>
            <p class="text-muted">Accedi al tuo account</p>
          </div>

          <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">

            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder="Email" ngModel name="email" required>
              <label for="email">Email</label>
            </div>

            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="password" placeholder="Password" ngModel name="password"
                required>
              <label for="password">Password</label>
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-3">
              Accedi
            </button>

          </form>
          @if (lblErrore) {
          <div class="text-danger text-center mb-2">
            Credenziali non valide
          </div>
          }

        </div>

      </div>

    </div>
  </div>

</div>
